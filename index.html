<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda + Chat Online</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

#moneda{
  font-size:80px;
  margin:20px;
}

.info{
  font-size:20px;
  margin:10px;
}

/* CHAT */
#chatContainer{
  position:fixed;
  bottom:10px;
  right:10px;
  width:260px;
  max-height:320px;
  background:rgba(0,0,0,0.7);
  border:2px solid #00ffcc;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

#chatMessages{
  flex:1;
  overflow-y:auto;
  padding:5px;
  border-bottom:1px solid #00ffcc;
}

#chatInput{
  width:70%;
  padding:5px;
}

#sendBtn{
  width:30%;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA</h1>

<h3 id="rango"></h3>

<h2 id="moneda">❓</h2>
<p>Presiona L, C o R</p>

<div class="info" id="stats"></div>

<!-- CHAT -->
<div id="chatContainer">
  <div id="chatMessages"></div>
  <div style="display:flex;">
    <input id="chatInput" placeholder="mensaje...">
    <button id="sendBtn">Enviar</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔥 CONFIGURA ESTO
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_APP.firebaseapp.com",
  databaseURL: "https://TU_APP-default-rtdb.firebaseio.com",
  projectId: "TU_APP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 RANGO
let role = localStorage.getItem("role") || "player";
document.getElementById("rango").innerText = "Rango: " + role;

// ---------------- JUEGO ----------------
let pesos=0, vidas=5, record=parseInt(localStorage.getItem("record"))||0;
let secuencia=["R","L","C","L","R","C","R"];
let indice=0;
let monedaActual="";
let velocidad=1500;
let intervalo;

if(role==="owner") vidas=999;
if(role==="admin") vidas=10;

const monedaEl=document.getElementById("moneda");
const statsEl=document.getElementById("stats");

function resetGame(){
  pesos=0; vidas=(role==="owner"?999:(role==="admin"?10:5));
  velocidad=1500; indice=0;
  actualizarStats();
  nuevaMoneda();
  clearInterval(intervalo);
  intervalo=setInterval(tiempoAgotado,velocidad);
}
resetGame();

function nuevaMoneda(){
  monedaActual=secuencia[indice];
  monedaEl.innerText=monedaActual;
  indice++; if(indice>=secuencia.length) indice=0;
}

function actualizarStats(){
  statsEl.innerText="Pesos:"+pesos+" | Vidas:"+vidas+" | Record:"+record;
}

function tiempoAgotado(){
  vidas--; actualizarStats();
  if(vidas<=0) gameOver();
  nuevaMoneda();
}

function gameOver(){
  clearInterval(intervalo);
  if(pesos>record){
    record=pesos;
    localStorage.setItem("record",record);
  }
  alert("GAME OVER\nPuntaje: "+pesos);
  resetGame();
}

document.addEventListener("keydown",function(e){
  const eleccion=e.key.toUpperCase();
  if(!["L","C","R"].includes(eleccion)) return;

  if(eleccion===monedaActual){
    pesos++;
    velocidad-=50;
    if(velocidad<500) velocidad=500;
    clearInterval(intervalo);
    intervalo=setInterval(tiempoAgotado,velocidad);
  } else {
    vidas--;
  }

  actualizarStats();
  if(vidas<=0) gameOver();
  nuevaMoneda();
});

// ---------------- CHAT ONLINE ----------------
const input=document.getElementById("chatInput");
const btn=document.getElementById("sendBtn");
const messages=document.getElementById("chatMessages");

// ENVIAR
function enviar(){
  if(!input.value.trim()) return;

  db.ref("chat").push({
    user: role,
    text: input.value,
    time: Date.now()
  });

  input.value="";
}

btn.onclick=enviar;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") enviar();
});

// RECIBIR
db.ref("chat").on("child_added",snap=>{
  const m=snap.val();

  const div=document.createElement("div");
  div.textContent="["+m.user+"] "+m.text;

  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
});
</script>

</body>
</html>
