<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Atrapa la Moneda</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{color:#00ffcc;}

#moneda{font-size:80px;margin:20px;}
.info{font-size:20px;margin:10px;}

/* LOGIN */
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border-radius:10px;
  border:2px solid #00ffcc;
}

input{
  margin:5px;
  padding:5px;
  border:none;
  border-radius:5px;
}

/* CHAT */
#chatContainer{
  position:fixed;
  bottom:10px;
  right:10px;
  width:250px;
  max-height:300px;
  background:#111;
  border:1px solid #00ffcc;
  border-radius:10px;
  padding:5px;
  display:flex;
  flex-direction:column;
}

#chatMessages{
  flex:1;
  overflow-y:auto;
  font-size:14px;
}

</style>
</head>

<body>

<h1>🎮 ATRAPA LA MONEDA</h1>

<div id="loginBox">
  <h3>Login</h3>
  <input id="user" placeholder="usuario"><br>
  <input id="pass" type="password" placeholder="contraseña"><br>
  <button onclick="login()">Entrar</button>
</div>

<h2 id="moneda">?</h2>
<p>Presiona L, C o R</p>
<div class="info" id="stats"></div>

<!-- CHAT -->
<div id="chatContainer">
  <div id="chatMessages"></div>
  <input id="chatInput" placeholder="Escribe..." />
</div>

<script>

// ===== USUARIOS =====
const users = {
  owner:{pass:"1234", role:"owner"},
  admin:{pass:"1234", role:"admin"},
  tester:{pass:"1234", role:"tester"},
  player:{pass:"1234", role:"player"}
};

let currentRole = "player";

// ===== LOGIN =====
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(users[u] && users[u].pass === p){
    currentRole = users[u].role;
    document.getElementById("loginBox").style.display = "none";
    addMessage("system","Logeado como "+currentRole);
  }else{
    alert("Error");
  }
}

// ===== JUEGO (MISMO) =====
let pesos=0, vidas=5, record=parseInt(localStorage.getItem("record"))||0;
let secuencia=["R","L","C","L","R","C","R"];
let indice=0, monedaActual="", velocidad=1500, intervalo;

const monedaEl=document.getElementById("moneda");
const statsEl=document.getElementById("stats");

function actualizarStats(){
  statsEl.innerText=`Pesos:${pesos} | Vidas:${vidas} | Record:${record}`;
}

function nuevaMoneda(){
  monedaActual=secuencia[indice];
  monedaEl.innerText=monedaActual;
  indice=(indice+1)%secuencia.length;
}

function tiempoAgotado(){
  vidas--;
  actualizarStats();
  if(vidas<=0) gameOver();
  nuevaMoneda();
}

function gameOver(){
  clearInterval(intervalo);
  if(pesos>record){
    record=pesos;
    localStorage.setItem("record",record);
  }
  alert("GAME OVER");
  resetGame();
}

function resetGame(){
  pesos=0; vidas=5; velocidad=1500; indice=0;
  actualizarStats();
  nuevaMoneda();
  clearInterval(intervalo);
  intervalo=setInterval(tiempoAgotado,velocidad);
}

document.addEventListener("keydown",function(e){
  const key=e.key.toUpperCase();
  if(!["L","C","R"].includes(key)) return;

  if(key===monedaActual){
    pesos++;
    velocidad=Math.max(500,velocidad-50);
    clearInterval(intervalo);
    intervalo=setInterval(tiempoAgotado,velocidad);
  }else{
    vidas--;
  }

  actualizarStats();
  if(vidas<=0) gameOver();
  nuevaMoneda();
});

resetGame();

// ===== CHAT + COMANDOS =====
const chatInput=document.getElementById("chatInput");
const chatMessages=document.getElementById("chatMessages");

chatInput.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    const text=chatInput.value.trim();
    if(!text) return;

    // comandos
    if(text.startsWith("/")){
      ejecutarComando(text);
    }else{
      addMessage("user",text);
    }

    chatInput.value="";
  }
});

function addMessage(type,text){
  const div=document.createElement("div");
  div.innerText=(type==="system"?"[SYS] ":"")+text;
  chatMessages.appendChild(div);

  if(chatMessages.children.length>20){
    chatMessages.removeChild(chatMessages.firstChild);
  }

  chatMessages.scrollTop=chatMessages.scrollHeight;
}

// ===== COMANDOS SEGÚN RANGO =====
function ejecutarComando(cmd){

  if(cmd==="/coins" && (currentRole==="admin"||currentRole==="owner")){
    pesos+=10;
    actualizarStats();
    addMessage("system","+10 monedas");
  }

  else if(cmd==="/vida" && currentRole==="owner"){
    vidas=9999;
    actualizarStats();
    addMessage("system","Vida infinita");
  }

  else if(cmd==="/test" && currentRole==="tester"){
    addMessage("system","Comando tester OK");
  }

  else{
    addMessage("system","No tienes permiso");
  }
}

</script>

</body>
</html>
